// This is a template for a singular stat row, which is used to display the stats in pokemon.html.
<div class="stat-row">
    <span class="stat-label">{{ stat_name }}</span>
    <div class="stat-bar-container">
        <div class="stat-bar-fill" style="width: {{ (stat_value / 360 * 100) | round(1) }}%; background-color: {{ stat_value | stat_color }};"></div>
    </div>
    <span class="stat-value">{{ stat_value }}</span>
</div>
